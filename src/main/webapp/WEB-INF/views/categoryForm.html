<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>카테고리 등록</title>
        <style>
            body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
            h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
            .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
            label { display: block; font-weight: bold; margin-bottom: 6px; color: #495057; }
            /*input[type="text"] { padding: 8px; width: 300px; border: 1px solid #ddd; border-radius: 4px; margin-right: 8px; }*/
            input[type="text"] {width: 100%; padding: 10px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1em; box-sizing: border-box; font-family: inherit;}
            .required { color: #e74c3c; }
            .error { color: #e74c3c; font-size: 0.9em; margin-top: 4px; display: block; }
            .btn-submit { background: #4a90d9; color: white; border: none; padding: 12px 32px; font-size: 1em; border-radius: 4px; cursor: pointer; }
            .btn-submit:hover { background: #357abd; }
            footer { margin-top: 40px; padding: 16px; border-top: 1px solid #ddd; color: #666; font-size: 0.9em; }
        </style>
    </head>
    <body>

        <h1>새 카테고리 등록</h1>

        <a class="back-btn" th:href="@{/categories}">← 목록으로 돌아가기</a>

        <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
            <label for="category">
                카테고리 이름 <span class="required">*</span>
            </label>
            <input id="category" type="text" th:field="*{name}" placeholder="카테고리 이름"/>
            <span class="error" th:errors="*{name}"></span>
            <br><br>
            <button type="submit" class="btn-submit">카테고리 등록</button>
        </form>

        <footer>
            <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371390 | 성명: 박제준'}"></p>
        </footer>

    </body>
</html>
